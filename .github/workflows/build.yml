name: Build APK

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Select Build Type'
        required: true
        default: 'Debug'
        type: choice
        options:
          - Debug
          - Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: ["arm64"]
      fail-fast: false

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Arm64 APK
        run: |
          chmod +x gradlew
          ./gradlew :ZalithLauncher:assemble${{ github.event.inputs.variant }} -Darch=${{ matrix.arch }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zalith-${{ github.event.inputs.variant }}-arm64
          path: ZalithLauncher/build/outputs/apk/${{ github.event.inputs.variant == 'Debug' && 'debug' || 'release' }}/*.apk
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Arm64 APK
        run: |
          chmod +x gradlew
          ./gradlew :ZalithLauncher:assemble${{ github.event.inputs.variant }} -Darch=${{ matrix.arch }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zalith-${{ github.event.inputs.variant }}-arm64
          path: ZalithLauncher/build/outputs/apk/${{ github.event.inputs.variant == 'Debug' && 'debug' || 'release' }}/*.apk
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Arm64 APK
        run: |
          chmod +x gradlew
          ./gradlew :ZalithLauncher:assemble${{ github.event.inputs.variant }} -Darch=${{ matrix.arch }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zalith-${{ github.event.inputs.variant }}-arm64
          path: ZalithLauncher/build/outputs/apk/${{ github.event.inputs.variant == 'Debug' && 'debug' || 'release' }}/*.apk
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          add-job-summary: "on-failure"

      - name: Build APK for ${{ matrix.arch }}
        run: |
          chmod +x gradlew
          ./gradlew ZalithLauncher:assemble${{ inputs.variant }} -Darch=${{ matrix.arch }}

      - name: Upload Release APK for ${{ matrix.arch }}
        if: inputs.variant == 'Release'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: release apk (${{ matrix.arch }})
          path: ZalithLauncher/build/outputs/apk/release/*.apk

      - name: Upload Debug APK for ${{ matrix.arch }}
        if: inputs.variant == 'Debug'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: debug apk (${{ matrix.arch }})
          path: ZalithLauncher/build/outputs/apk/debug/*.apk
